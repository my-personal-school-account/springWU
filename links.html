<!DOCTYPE html>

		<link rel="stylesheet" href="css/style.css">
		<title>Document</title>

		<link rel="preconnect" href="https://fonts.googleapis.com">

				<section id="links-grid" class="dm-mono">
					<a href="https://github.com/placeholder-account-for-website-that-is-really-specific" class="link-card brand-link">

							<span>
								placeholder-github
							</span>
						</div>
					</a>
					<a class="link-card brand-link" href="https://github.com/placeholder-account-for-website-that-is-really-specific">

							<span>

						</div>

			<aside>
			</aside>
